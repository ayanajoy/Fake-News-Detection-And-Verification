<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detection And Verifivation</title>
    <!-- Modern Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="container fade-in">
            <header class="header">
                <div class="brand-badge">AI ANALYTICS</div>
                <h1>News Authenticity <span class="text-gradient">Verifier</span></h1>
            </header>

            <form action="/predict" method="post" class="analysis-form">
                <div class="input-container">
                    <div class="label-row">
                        <label>Content for Analysis</label>
                        <span class="char-hint">Paste full article or headline</span>
                    </div>
                    <textarea name="text" rows="6" placeholder="Example: Scientists discover new ozone-friendly material..." required></textarea>
                </div>

                <button type="submit" class="primary-btn">
                    <span class="btn-text">Run Verification</span>
                    <i data-lucide="shield-check"></i>
                </button>
            </form>

            {% if prediction %}
            <div class="result-section slide-up">
                <div class="divider"><span>Analysis Report</span></div>
                
                <div class="status-card {% if prediction == 'Real News' %}status-real{% else %}status-fake{% endif %}">
                    <div class="status-icon">
                        {% if prediction == 'Real News' %}
                            <i data-lucide="check-circle-2"></i>
                        {% else %}
                            <i data-lucide="alert-octagon"></i>
                        {% endif %}
                    </div>
                    <div class="status-info">
                        <span class="status-label">Primary Verdict</span>
                        <h2 class="status-value">{{ prediction }}</h2>
                    </div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-item">
                        <div class="metric-header">
                            <span class="metric-label">Reliability Score</span>
                            <span class="metric-percentage">{{ real }}%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill real-fill" style="width: {{ real }}%"></div>
                        </div>
                    </div>

                    <div class="metric-item">
                        <div class="metric-header">
                            <span class="metric-label">Information Risk</span>
                            <span class="metric-percentage">{{ fake }}%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill fake-fill" style="width: {{ fake }}%"></div>
                        </div>
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
